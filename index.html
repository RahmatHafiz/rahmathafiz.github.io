  <style>
    body {

      cursor: crosshair;
      transition: background-position 0.1s ease-out;
    }

    .animate-item {
      opacity: 0;
    }

    /* Drag System */
    .neo-card {
      border: 2px solid #000000;
      box-shadow: 4px 4px 0px 0px #000000;
      background-color: #ffffff;
      transition: box-shadow 0.2s, transform 0.2s, background-color 0.2s;
      position: relative;
      left: var(--drag-x, 0px);
      top: var(--drag-y, 0px);
      z-index: 10;
      touch-action: none;
    }

    .neo-card:hover {
      box-shadow: 6px 6px 0px 0px #000000;
      transform: translate(-2px, -2px);
    }

    .neo-card:active {
      box-shadow: 0px 0px 0px 0px #000000;
      transform: translate(4px, 4px);
    }

    .neo-card.is-dragging {
      transition: none !important;
      transform: rotate(3deg) scale(1.02) !important;
      box-shadow: 10px 10px 0px 0px #000000 !important;
      z-index: 50 !important;
      cursor: grabbing !important;
    }

    .neo-btn {
      border: 2px solid #000000;
      background: #ffffff;
      box-shadow: 3px 3px 0px #000000;
      transition: all 0.2s ease;
    }

    .neo-btn:hover {
      background: #000000;
      color: #ffffff;
      transform: translate(-2px, -2px);
      box-shadow: 5px 5px 0px #000000;
    }

    .neo-btn:active {
      transform: translate(3px, 3px);
      box-shadow: 0px 0px 0px #000000;
    }

    .neo-profile {
      border: 3px solid #000000;
      box-shadow: 6px 6px 0px #000000;
      filter: grayscale(100%) contrast(1.2);
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .neo-profile:hover {
      filter: grayscale(0%) contrast(1);
      transform: rotate(-5deg) scale(1.05);
      box-shadow: 10px 10px 0px #000000;
    }

    .floating-shape {
      position: absolute;
      border: 2px solid #000000;
      pointer-events: none;
      z-index: -1;
      animation: float 6s ease-in-out infinite;
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0) rotate(0deg);
      }

      50% {
        transform: translateY(-20px) rotate(15deg);
      }
    }

    /* Custom Cursor Follower */
    .cursor-box {
      position: fixed;
      top: 0;
      left: 0;
      width: 28px;
      height: 28px;
      border: 2px solid #000;
      background: transparent;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: width 0.2s, height 0.2s, background-color 0.2s, border-radius 0.2s;
      mix-blend-mode: difference;
    }

    .cursor-box.hovering {
      width: 45px;
      height: 45px;
      background: #fff;
      border-radius: 50%;
      mix-blend-mode: difference;
    }

    /* Efek Glitch Teks pada Nama */
    .glitch-hover {
      display: inline-block;
    }

    .glitch-hover:hover {
      animation: glitch-skew 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94) both infinite;
      color: transparent;
      text-shadow: 2px 2px 0px #000, -2px -2px 0px #aaa;
    }

    @keyframes glitch-skew {
      0% {
        transform: skew(0deg) translate(0);
      }

      20% {
        transform: skew(-10deg) translate(-2px, 1px);
      }

      40% {
        transform: skew(10deg) translate(2px, -1px);
      }

      60% {
        transform: skew(-5deg) translate(-1px, 2px);
      }

      80% {
        transform: skew(5deg) translate(1px, -2px);
      }

      100% {
        transform: skew(0deg) translate(0);
      }
    }

    /* Toast Notifikasi */
    #toast {
      border: 2px solid #000000;
      box-shadow: 4px 4px 0px 0px #000000;
      transition: opacity 0.3s ease, transform 0.3s ease;
      opacity: 0;
      transform: translate(-50%, 20px);
      pointer-events: none;
      background: #ffffff;
      color: #000000;
      left: 50%;
    }

    #toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

                                    <div class="pointer-events-none">
                                        <h3 class="text-[13px] font-primary font-bold text-black group-hover:tracking-wide transition-all duration-300 leading-tight">${link.title}</h3>
                                        ${link.subtitle ? `<p class="text-gray-800 text-[11px] font-mono mt-1">${link.subtitle}</p>` : ''}
                                    </div>
                                </a>
                                <div class="absolute inset-0 bg-gray-100 -translate-y-full group-hover:translate-y-0 transition-transform duration-300 ease-out z-0 pointer-events-none"></div>
                            </div>
                        `;
          });
          htmlContent += `</div>`;
        } else {
          htmlContent += `<div class="flex flex-col gap-3">`;
          category.items.forEach((link) => {
            animationDelay += 0.1;
            htmlContent += `
                            <div class="neo-card flex items-center p-2.5 rounded-lg group overflow-hidden bg-white cursor-grab active:cursor-grabbing"
                               style="animation-delay: ${animationDelay}s;">
                                <a href="${link.url}" ${link.url !== '#' ? 'target="_blank" rel="noopener noreferrer"' : ''} class="flex items-center flex-1 z-10 w-full outline-none select-none focus-visible:ring-2 focus-visible:ring-black focus-visible:ring-offset-2 rounded-md">
                                    <div class="flex items-center justify-center w-10 h-10 rounded-md border-2 border-black bg-white group-hover:bg-black group-hover:text-white transition-colors duration-300 pointer-events-none">
                                        ${link.customSvg ? link.customSvg : `<i data-lucide="${link.icon}" aria-hidden="true" class="w-5 h-5"></i>`}
                                    </div>
                                    <div class="flex-1 px-3 text-left pointer-events-none">
                                        <h3 class="text-[15px] font-primary font-bold text-black group-hover:tracking-wide transition-all duration-300 leading-tight">${link.title}</h3>
                                        ${link.subtitle ? `<p class="text-gray-800 text-[11px] font-mono mt-0.5">${link.subtitle}</p>` : ''}
                                    </div>
                                    <div class="w-7 h-7 flex items-center justify-center border-2 border-transparent rounded-full group-hover:border-black group-hover:translate-x-1 group-hover:-rotate-45 transition-all duration-300 pointer-events-none">
                                        <i data-lucide="arrow-right" aria-hidden="true" class="w-4 h-4 text-black"></i>
                                    </div>
                                </a>
                                <div class="absolute inset-0 bg-gray-100 -translate-x-full group-hover:translate-x-0 transition-transform duration-300 ease-out z-0 pointer-events-none"></div>
                            </div>
                        `;
          });
          htmlContent += `</div>`;
        }
        htmlContent += `</section>`;
      });
      container.innerHTML = htmlContent;
    }

    // Salin Tautan Langsung (Modern Clipboard API dengan Fallback Terbaik)
    function copyProfileLink() {
      const url = window.location.href;
      const toast = document.getElementById('toast');
      const showSuccessToast = () => {
        document.getElementById('toast-text').innerText = "Tautan profil disalin!";
        toast.classList.add('show');
        setTimeout(() => { toast.classList.remove('show'); }, 3000);
      };

      // Menggunakan API Modern
      if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(url).then(showSuccessToast);
      } else {
        // Fallback untuk browser tua / tanpa HTTPS
        const tempInput = document.createElement('textarea');
        tempInput.value = url;
        tempInput.style.position = 'absolute';
        tempInput.style.left = '-9999px';
        document.body.appendChild(tempInput);
        tempInput.select();
        try {
          document.execCommand('copy');
          showSuccessToast();
        } catch (err) {
          console.error('Gagal menyalin:', err);
        }
        document.body.removeChild(tempInput);
      }
    }

    // Partikel Efek (Hanya untuk memanjakan mata, non-blocking)
    function createParticles(x, y, count = 10) {
      const colors = ['#000000', '#555555', '#cccccc'];
      for (let i = 0; i < count; i++) {
        const particle = document.createElement('div');
        particle.className = 'fixed pointer-events-none z-50';
        const size = Math.random() * 6 + 3;
        particle.style.width = size + 'px';
        particle.style.height = size + 'px';
        particle.style.background = colors[Math.floor(Math.random() * colors.length)];
        if (Math.random() > 0.5) particle.style.borderRadius = '50%';

        particle.style.left = x + 'px';
        particle.style.top = y + 'px';
        document.body.appendChild(particle);

        const angle = Math.random() * Math.PI * 2;
        const velocity = Math.random() * 50 + 20;
        const tx = Math.cos(angle) * velocity;
        const ty = Math.sin(angle) * velocity;

        particle.animate([
          { transform: 'translate(-50%, -50%) scale(1) rotate(0deg)', opacity: 1 },
          { transform: `translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px)) scale(0) rotate(${Math.random() * 180}deg)`, opacity: 0 }
        ], {
          duration: 400 + Math.random() * 300,
          easing: 'cubic-bezier(0, .9, .57, 1)'
        }).onfinish = () => particle.remove();
      }
    }

    // Desktop Interactive (Kursor & Dodge) - Berjalan dalam rAF untuk Performance
    if (window.matchMedia("(min-width: 768px)").matches) {
      const cursorFollower = document.getElementById('cursor-follower');
      const dodgeShapes = document.querySelectorAll('.dodge-shape');

      let mouseX = 0, mouseY = 0;
      let cursorX = 0, cursorY = 0;

      function animateCursor() {
        cursorX += (mouseX - cursorX) * 0.2;
        cursorY += (mouseY - cursorY) * 0.2;

        if (cursorFollower) {
          cursorFollower.style.left = cursorX + 'px';
          cursorFollower.style.top = cursorY + 'px';
        }
        requestAnimationFrame(animateCursor);
      }
      requestAnimationFrame(animateCursor);

      // Throttle ringan menggunakan pasif listeners
      document.addEventListener('mousemove', (e) => {
        const x = (e.clientX / window.innerWidth - 0.5) * 20;
        const y = (e.clientY / window.innerHeight - 0.5) * 20;
        document.body.style.backgroundPosition = `${x}px ${y}px`;

        mouseX = e.clientX;
        mouseY = e.clientY;

        dodgeShapes.forEach(shape => {
          const rect = shape.getBoundingClientRect();
          const shapeCenterX = rect.left + rect.width / 2;
          const shapeCenterY = rect.top + rect.height / 2;

          const distX = e.clientX - shapeCenterX;
          const distY = e.clientY - shapeCenterY;
          const distance = Math.sqrt(distX * distX + distY * distY);

          if (distance < 120) {
            const force = (120 - distance) / 120;
            const moveX = -(distX / distance) * force * 70;
            const moveY = -(distY / distance) * force * 70;

            shape.style.transform = `translate(${moveX}px, ${moveY}px) rotate(${distance * 2}deg) scale(1.3)`;
            shape.style.transition = 'transform 0.1s ease-out';
          } else {
            shape.style.transform = '';
            shape.style.transition = 'transform 0.5s ease-out';
          }
        });
      }, { passive: true });

      document.addEventListener('mouseover', (e) => {
        if (e.target.closest('a') || e.target.closest('button') || e.target.closest('.neo-card') || e.target.closest('.neo-profile')) {
          if (cursorFollower) cursorFollower.classList.add('hovering');
        }
      }, { passive: true });

      document.addEventListener('mouseout', (e) => {
        if (e.target.closest('a') || e.target.closest('button') || e.target.closest('.neo-card') || e.target.closest('.neo-profile')) {
          if (cursorFollower) cursorFollower.classList.remove('hovering');
        }
      }, { passive: true });
    }

    // Drag Handler
    let isDragging = false;
    let dragCard = null;
    let startX = 0, startY = 0;
    let initialDragX = 0, initialDragY = 0;
    let zIndexCounter = 10;
    let hasDragged = false;
    let dragThreshold = 5;

    function initFreeDrag() {
      const cards = document.querySelectorAll('.neo-card');

      cards.forEach(card => {
        const startDrag = (e) => {
          isDragging = true;
          dragCard = card;
          hasDragged = false;

          zIndexCounter++;
          dragCard.style.zIndex = zIndexCounter;

          const clientX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
          const clientY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;

          startX = clientX;
          startY = clientY;

          const currentX = parseFloat(dragCard.style.getPropertyValue('--drag-x')) || 0;
          const currentY = parseFloat(dragCard.style.getPropertyValue('--drag-y')) || 0;

          initialDragX = currentX;
          initialDragY = currentY;

          dragCard.classList.add('is-dragging');
          if (navigator.vibrate) navigator.vibrate(10);
        };

        card.addEventListener('mousedown', startDrag);
        card.addEventListener('touchstart', startDrag, { passive: false });

        card.addEventListener('click', (e) => {
          if (hasDragged) {
            e.preventDefault();
          } else {
            createParticles(e.clientX, e.clientY);
          }
        });
      });

      const onDrag = (e) => {
        if (!isDragging || !dragCard) return;

        const clientX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
        const clientY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;

        const dx = clientX - startX;
        const dy = clientY - startY;

        if (Math.abs(dx) > dragThreshold || Math.abs(dy) > dragThreshold) {
          hasDragged = true;
          e.preventDefault();
        }

        const newX = initialDragX + dx;
        const newY = initialDragY + dy;

        dragCard.style.setProperty('--drag-x', `${newX}px`);
        dragCard.style.setProperty('--drag-y', `${newY}px`);

        if (hasDragged && Math.random() > 0.85) {
          createParticles(clientX, clientY + 15, 1);
        }
      };

      const stopDrag = (e) => {
        if (!isDragging || !dragCard) return;
        isDragging = false;
        dragCard.classList.remove('is-dragging');

        if (hasDragged) {
          if (navigator.vibrate) navigator.vibrate(10);
          const clientX = e.type.includes('mouse') ? e.clientX : (e.changedTouches ? e.changedTouches[0].clientX : 0);
          const clientY = e.type.includes('mouse') ? e.clientY : (e.changedTouches ? e.changedTouches[0].clientY : 0);
          if (clientX && clientY) createParticles(clientX, clientY);
        }

        dragCard = null;
      };

      document.addEventListener('mousemove', onDrag, { passive: false });
      document.addEventListener('touchmove', onDrag, { passive: false });
      document.addEventListener('mouseup', stopDrag, { passive: true });
      document.addEventListener('touchend', stopDrag, { passive: true });
    }

    document.addEventListener('click', (e) => {
      if (!e.target.closest('.neo-card') && !e.target.closest('.neo-btn')) {
        createParticles(e.clientX, e.clientY);
      }
    });

    document.addEventListener('DOMContentLoaded', () => {
      renderLinks();

      // Tunggu dom stabil lalu inisiasi icons
      if (window.lucide) { lucide.createIcons(); }

      const animateItems = document.querySelectorAll('.animate-item');
      animateItems.forEach(item => {
        item.classList.add('animate-fade-in-up');
        item.addEventListener('animationend', () => {
          item.classList.remove('animate-fade-in-up', 'animate-item');
        });
      });

      initFreeDrag();

      // Eksekusi jika Vanilla Tilt sudah siap diakses & lebar layar > desktop
      if (window.matchMedia("(min-width: 768px)").matches && typeof VanillaTilt !== 'undefined') {
        VanillaTilt.init(document.querySelectorAll(".neo-card"), {
          max: 5,
          speed: 400,
          glare: true,
          "max-glare": 0.1,
          scale: 1.02
        });
      }

      if (window.DeviceOrientationEvent && !window.matchMedia("(min-width: 768px)").matches) {
        window.addEventListener('deviceorientation', (e) => {
          if (e.beta === null || e.gamma === null) return;

          let gamma = Math.max(-45, Math.min(45, e.gamma));
          let beta = Math.max(-45, Math.min(45, e.beta));

          const x = (gamma / 45) * 25;
          const y = (beta / 45) * 25;

          document.body.style.backgroundPosition = `${x}px ${y}px`;

          const dodgeShapes = document.querySelectorAll('.dodge-shape');
          dodgeShapes.forEach((shape, index) => {
            const depth = (index + 1) * 0.4;
            shape.style.transform = `translate(${x * depth}px, ${y * depth}px)`;
          });
        });
      }
    });
  </script>
